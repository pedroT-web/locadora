<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora de Veículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/estilo.css">
</head>

<body>
    <main class="tudo">
        <div id="col1">
            <img src="img/icone.png" alt="ícone de caminhão">
            <h2 class="titulo">Encontre o veículo certo para você!</h2>
            <p class="texto">Preencha as informações abaixo</p>
            <form class="pedido">
                <label class="rotulo">Nome</label>
                <input type="text" id="nome" class="campo-texto form-control">
                <label class="rotulo">E-mail</label>
                <input type="text" id="email" class="campo-texto form-control">
                <label class="rotulo">Selecione o tipo de veículo</label>
                <select class="campo-texto" id="tipoVeiculo">
                    <option>Basico</option>
                    <option>Familia</option>
                    <option>Luxo</option>
                </select>
                <button class="botao-reservar" type="button" id="botao_reservar">FAZER MINHA RESERVA</button>
            </form>
        </div>
        <div id="col2">
            <h1 class="oferta">VOCÊ PODE ALUGAR ESSE VEÍCULO POR R$ <strong class="destaque">99</strong> / DIA</h1>
            <p class="texto-oferta">Válido para todo território nacional</p>
            <img src="img/renault-kwid.png" alt="Renault Kwid">
        </div>
    </main>

    <script src="./js/app-reserva.js"></script>
</body>

</html>
