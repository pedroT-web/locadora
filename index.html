<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora de Veículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/estilo.css">
</head>

<body>
    <main class="tudo">
        <div id="col1">
            <img src="img/icone.png" alt="ícone de caminhão">
            <h2 class="titulo">Encontre o veículo certo para você!</h2>
            <p class="texto mb-3">Preencha as informações abaixo</p>
            <form id="formulario_reservaCliente" class=" validar row">
                <div class="col-12 mb-3">
                    <label for="validationCustom02" class="form-label rotulo">Nome</label>
                    <input type="text" class="form-control limpeza" id="nomeClienteReserva" required>
                    <div class="invalid-feedback mb-3">
                       Informe o nome do usuario
                    </div>
                </div>
                <div class="col-12 mb-3">
                    <label for="validationCustom02" class="form-label rotulo">E-mail</label>
                    <input type="text" class="form-control limpeza" id="emailClienteReserva" required>
                    <div class="invalid-feedback mb-3">
                        Informe o email do usuario
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="validationCustom02" class="form-label rotulo">Inicio a da Reserva</label>
                    <input type="date" class="form-control shadow-sm limpeza" id="reservaDataInicial" required>
                    <div class="invalid-feedback">
                        Informe a data inical da reserva
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="validationCustom02" class="form-label rotulo">Fim da Reserva</label>
                    <input type="date" class="form-control shadow-sm limpeza" id="reservaDataFinal" required>
                    <div class="invalid-feedback">
                        Informe a data final da reserva
                    </div>
                </div>
                <div class="col-12 mb-2">
                    <label for="validationCustom04" class="form-label rotulo">Selecione o veículo</label>
                    <select class="campo-texto form-select shadow-sm limpeza" id="veiculoClienteReserva" required>
                        <option selected disabled value="">Selecione</option>
                    </select>
                    <div class="invalid-feedback">
                        Selecione um nível
                    </div>
                </div>
                <button class="botao-reservar" type="button" id="botao_reservar">FAZER MINHA RESERVA</button>
            </form>
        </div>
        <div id="col2">
            <h1 class="oferta">VOCÊ PODE ALUGAR ESSE VEÍCULO POR R$ <strong class="destaque">99</strong> / DIA</h1>
            <p class="texto-oferta">Válido para todo território nacional</p>
            <img src="img/renault-kwid.png" alt="Renault Kwid">
        </div>
    </main>

    <script src="./js/app-reservaCliente.js"></script>
</body>

</html>
