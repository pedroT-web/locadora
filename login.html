<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora - Pedro</title>

    <link rel="stylesheet" href="./css/estilo.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <section class="d-flex align-items-center fundo_login" style="height: 100vh;">
        <div class="container container_login">
            <form id="formulario_login" class="shadow formulario validar" novalidate>
                <h4 class="text-center">Realize seu Login</h4>
                <label class="text-center w-100 mb-3">Faça login para administrar sua locadora com praticidade.</label>
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="email_login" class="form-control" placeholder="Digite seu email" required>
                    <div class="invalid-feedback">
                        Email Incorreto
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="senha_login" class="form-control" placeholder="Digite a sua Senha"
                        required>
                    <div class="invalid-feedback">
                        Senha Incorreta
                    </div>
                </div>
                <div class="forms-footer w-100">
                    <a type="button" id="botao_login" class="btn btn-primary w-100">Entrar</a>
                </div>
            </form>
        </div>

    </section>

    <script src="./js/app-login.js"></script>
</body>

</html>
